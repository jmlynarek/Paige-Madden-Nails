<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FAF6F2" />
<title>Paige Madden Nails — Custom Order</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
<link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FAF6F2;
    --blush: #FBEBEB;
    --rose: #B46869;
    --dusty: #DC8289;
    --highlight: #F1BCBD;
    --card: #EDE5DE;
    --neutral: #B69886;
    --ink: #5F463F;
    --ink-2: #8C6A60;
    --ink-soft: rgba(95, 70, 63, 0.62);
    --hair: rgba(95, 70, 63, 0.12);
    --line: rgba(95, 70, 63, 0.16);
    --rose-30: rgba(180, 104, 105, 0.34);
    --surface: #FFFFFF;
    --shadow: 0 1px 2px rgba(95,70,63,0.04), 0 14px 34px rgba(95,70,63,0.07);
    --shadow-sm: 0 1px 2px rgba(95,70,63,0.05), 0 6px 16px rgba(95,70,63,0.05);
    --script: 'Pinyon Script', cursive;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Hanken Grotesk', system-ui, sans-serif;

    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: radial-gradient(125% 90% at 50% 0%, #F2ECE6 0%, #E7DDD4 100%);
    -webkit-font-smoothing: antialiased;
    color: var(--ink);
  }

  #root { min-height: 100%; }

  /* ── App shell (fills the phone viewport, capped for larger screens) ── */
  .app {
    height: 100vh;
    height: 100dvh;
    max-width: 460px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(95,70,63,0.06);
  }
  .app__scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .pad { padding: 0 26px; }

  /* ── Top bar (progress) ── */
  .topbar {
    padding: calc(var(--safe-top) + 20px) 24px 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .iconbtn {
    width: 40px; height: 40px;
    padding: 0;
    -webkit-appearance: none; appearance: none;
    border-radius: 50%;
    border: 1px solid var(--hair);
    background: rgba(255,255,255,0.6);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s ease, transform .1s ease;
  }
  .iconbtn:active { transform: scale(0.94); }
  .progress { flex: 1; }
  .progress__meta {
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.26em;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 7px;
    padding-left: 2px;
  }
  .progress__track {
    height: 4px;
    border-radius: 99px;
    background: rgba(95,70,63,0.10);
    overflow: hidden;
  }
  .progress__bar {
    height: 100%;
    border-radius: 99px;
    background: var(--rose);
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* ── Footer CTA ── */
  .footer {
    flex-shrink: 0;
    padding: 14px 26px calc(var(--safe-bottom) + 30px);
    background: linear-gradient(180deg, rgba(250,246,242,0) 0%, var(--bg) 28%);
  }

  /* ── Headings ── */
  .eyebrow {
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.30em;
    font-size: 12px;
    font-weight: 600;
    color: var(--rose);
  }
  .title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 32px;
    line-height: 1.16;
    letter-spacing: 0.004em;
    color: var(--ink);
    margin: 9px 0 0;
  }
  .title .script {
    font-family: var(--script);
    font-weight: 400;
    font-size: 1.22em;
    line-height: 0.8;
    letter-spacing: 0;
  }
  .lede {
    font-size: 15.5px;
    line-height: 1.5;
    color: var(--ink-soft);
    margin: 16px 0 0;
    max-width: 32ch;
    text-wrap: pretty;
  }

  /* ── Button ── */
  .btn {
    width: 100%;
    min-height: 58px;
    border: none;
    border-radius: 18px;
    background: var(--rose);
    color: #fff;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.01em;
    white-space: nowrap;
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(180,104,105,0.34);
    transition: transform .12s ease, box-shadow .2s ease, opacity .2s ease;
  }
  .btn:active { transform: translateY(1.5px) scale(0.995); box-shadow: 0 6px 16px rgba(180,104,105,0.28); }
  .btn--soft {
    background: transparent;
    color: var(--ink);
    box-shadow: none;
    min-height: 46px;
    font-weight: 500;
    font-size: 15px;
  }
  .btn[disabled] { opacity: 0.42; box-shadow: none; cursor: default; }
  /* Keyboard focus visibility (pointer taps stay ring-free). */
  .btn:focus-visible, .iconbtn:focus-visible, .shape:focus-visible, .tier:focus-visible,
  .sizechip:focus-visible, .step__btn:focus-visible, .seg button:focus-visible,
  .paytile:focus-visible, .ig-cta:focus-visible, .paycode__chip:focus-visible,
  .thumb__x:focus-visible, .drop:focus-visible {
    outline: 2.5px solid var(--rose);
    outline-offset: 2px;
  }
  .btn__spin {
    display: inline-block; width: 16px; height: 16px;
    margin-right: 9px; vertical-align: -2px;
    border: 2px solid rgba(255,255,255,0.45);
    border-top-color: #fff;
    border-radius: 50%;
    animation: btnspin .6s linear infinite;
  }
  @keyframes btnspin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .btn__spin { animation: none; } }
  .btn__hint {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    margin: 12px 0 0;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: 22px;
    box-shadow: var(--shadow);
  }

  /* ── Form fields ── */
  .field { margin-top: 18px; }
  .field-2col { display: flex; gap: 12px; }
  .field-2col .field { flex: 1; min-width: 0; }
  .field__label {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
    letter-spacing: 0.005em;
  }
  .field__label .opt {
    font-weight: 500;
    color: var(--ink-soft);
    font-size: 12.5px;
  }
  .input, .textarea {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 15px;
    padding: 0 16px;
    height: 54px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .textarea {
    height: auto;
    min-height: 108px;
    padding: 14px 16px;
    line-height: 1.5;
    resize: none;
  }
  .textarea--sm { min-height: 76px; }
  .reveal { animation: reveal .32s cubic-bezier(.22,.61,.36,1) both; }
  @keyframes reveal { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .input::placeholder, .textarea::placeholder { color: rgba(95,70,63,0.40); font-weight: 400; }
  .input:focus, .textarea:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3.5px rgba(180,104,105,0.13);
  }
  .input.err, .textarea.err { border-color: var(--dusty); box-shadow: 0 0 0 3.5px rgba(220,130,137,0.16); }
  .field__err {
    margin: 7px 2px 0;
    font-size: 12.5px;
    color: #C26A6F;
    font-weight: 500;
  }

  /* ── Select (sizing) ── */
  .selwrap { position: relative; }
  .selwrap svg.chev {
    position: absolute;
    right: 13px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }
  select.sel {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 13px;
    height: 48px;
    padding: 0 36px 0 15px;
    font-family: var(--sans);
    font-size: 15.5px;
    font-weight: 600;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  select.sel:focus { border-color: var(--rose); box-shadow: 0 0 0 3.5px rgba(180,104,105,0.13); }
  select.sel.filled { background: #F3EDE6; border-color: rgba(95,70,63,0.24); color: var(--ink); }
  select.sel.unset { color: rgba(95,70,63,0.40); font-weight: 500; }

  /* ── Design tier ── */
  .tiers { display: flex; flex-direction: column; gap: 10px; }
  .tier {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 15px 16px;
    cursor: pointer;
    font-family: var(--sans);
    box-shadow: var(--shadow-sm);
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .tier.on { border-color: var(--rose); background: #FBF1F0; box-shadow: 0 0 0 3px rgba(180,104,105,0.12); }
  .tier__radio {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--line);
    flex-shrink: 0;
    margin-top: 1px;
    position: relative;
    transition: border-color .15s ease;
  }
  .tier.on .tier__radio { border-color: var(--rose); }
  .tier.on .tier__radio::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--rose);
  }
  .tier__body { flex: 1; min-width: 0; }
  .tier__top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .tier__name { font-size: 16px; font-weight: 700; color: var(--ink); }
  .tier__price { font-size: 16px; font-weight: 700; color: var(--rose); }
  .tier__desc { display: block; font-size: 13px; line-height: 1.4; color: var(--ink-soft); margin-top: 4px; }
  /* Compact 2-up tiers for the no-scroll design step */
  .tiers--tight { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tiers--tight .tier { padding: 12px 14px; align-items: center; }
  .tiers--tight .tier__radio { display: none; }
  .tiers--tight .tier__top { flex-direction: column; align-items: flex-start; gap: 1px; }
  .tiers--tight .tier__desc { display: none; }

  /* ── Sizing rows ── */
  .hand { margin: 16px 22px 0; padding: 6px 18px 8px; }
  .hand__head {
    display: flex; align-items: center; gap: 9px;
    padding: 10px 0 6px;
  }
  .hand__title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--ink);
    white-space: nowrap;
  }
  .hand__count {
    margin-left: auto;
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .frow {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-top: 1px solid var(--hair);
  }
  .frow .finger {
    flex: 1;
    font-size: 15.5px;
    font-weight: 500;
    color: var(--ink);
  }
  .frow .selwrap { width: 124px; flex-shrink: 0; }

  /* ── Size presets (S/M/L chips) ── */
  .sizechips { display: flex; gap: 10px; }
  .sizechip {
    flex: 1;
    min-height: 46px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, box-shadow .2s ease, transform .1s ease;
  }
  .sizechip:active { transform: scale(0.97); }
  .sizechip.on { border-color: var(--rose); background: #FBF1F0; color: var(--rose); box-shadow: 0 0 0 3px rgba(180,104,105,0.12); }

  /* ── Per-finger stepper ── */
  .stepper {
    width: 124px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    gap: 6px;
  }
  .step__btn {
    width: 40px; height: 40px; flex-shrink: 0;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: var(--surface);
    color: var(--rose);
    font-size: 22px; font-weight: 500; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .step__btn:active { transform: scale(0.92); }
  .step__btn:disabled { opacity: 0.32; cursor: default; }
  .step__val {
    flex: 1; text-align: center;
    font-size: 16px; font-weight: 600;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .step__val.unset { color: var(--ink-soft); font-weight: 500; }
  .footer__err { margin-bottom: 8px; }
  .footer__err:empty { display: none; }

  /* ── Shape picker ── */
  .subhead {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.005em;
    margin: 4px 0 11px;
  }
  .shapes {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 11px;
  }
  .shape {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 8px 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: var(--sans);
    box-shadow: var(--shadow-sm);
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease, transform .1s ease;
  }
  .shape:active { transform: scale(0.98); }
  .shape.on {
    border-color: var(--rose);
    background: #FBF1F0;
    box-shadow: 0 0 0 3px rgba(180,104,105,0.12);
  }
  .shape__silbox {
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape__icon {
    width: auto;
    height: 76px;
    display: block;
    object-fit: contain;
  }
  .shape__name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  /* ── Upload ── */
  .drop {
    margin-top: 8px;
    border: 1.6px dashed rgba(95,70,63,0.22);
    border-radius: 20px;
    background: #F5EFE9;
    padding: 26px 20px;
    text-align: center;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .drop:active { background: #EFE7DF; }
  .drop__circle {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #fff;
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm);
  }
  .drop__t { font-weight: 600; font-size: 15.5px; color: var(--ink); }
  .drop__s { font-size: 13px; color: var(--ink-soft); margin-top: 4px; line-height: 1.4; }
  /* Compact drop for the no-scroll design step */
  .drop--sm { padding: 13px 16px; display: flex; align-items: center; gap: 13px; text-align: left; }
  .drop--sm .drop__circle { width: 40px; height: 40px; margin: 0; flex-shrink: 0; }
  .drop--sm .drop__s { margin-top: 2px; }
  /* Fixed-height photo strip (thumbnails + add tile) — height stays constant
     as photos are added, so nothing below it shifts. */
  .photostrip { display: flex; gap: 10px; margin-top: 8px; }
  .pchip { position: relative; width: 68px; height: 68px; border-radius: 14px; overflow: hidden; flex-shrink: 0; box-shadow: var(--shadow-sm); }
  .pchip img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pchip__x {
    position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
    border: none; border-radius: 50%; background: rgba(95,70,63,0.82); color: #fff;
    display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;
  }
  .padd {
    width: 68px; height: 68px; flex-shrink: 0;
    border: 1.6px dashed rgba(95,70,63,0.30); border-radius: 14px;
    background: #F5EFE9; cursor: pointer; padding: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    -webkit-appearance: none; appearance: none;
  }
  .padd:active { background: #EFE7DF; }
  .padd__t { font-size: 11px; font-weight: 600; color: var(--rose); }
  .thumbs {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 1;
    border-radius: 15px;
    overflow: hidden;
    background: var(--card);
    box-shadow: var(--shadow-sm);
    animation: pop .3s cubic-bezier(.2,.9,.3,1.2);
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb__x {
    position: absolute; top: 6px; right: 6px;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(95,70,63,0.78);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(2px);
  }
  /* Enlarge the tap target beyond the visible dot for booth phones. */
  .thumb__x::after { content: ''; position: absolute; inset: -9px; }
  @keyframes pop { from { opacity: 0; transform: scale(.86); } to { opacity: 1; transform: scale(1); } }
  .photohint { font-size: 12.5px; color: var(--ink-soft); margin: 12px 2px 0; }
  .photohint.warn { color: var(--rose); font-weight: 600; }

  /* ── Segmented control ── */
  .seg {
    display: flex;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 15px;
    padding: 4px;
    gap: 4px;
  }
  .seg button {
    flex: 1;
    height: 46px;
    border: none;
    border-radius: 11px;
    background: transparent;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14.5px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: color .2s ease;
  }
  .seg button.on { background: var(--rose); color: #fff; box-shadow: 0 4px 12px rgba(180,104,105,0.28); }
  .seg--stack button { flex-direction: column; gap: 1px; height: 52px; }
  .seg--stack .seg__t { font-size: 14.5px; font-weight: 600; line-height: 1.1; }
  .seg--stack .seg__s { font-size: 11.5px; font-weight: 500; opacity: 0.85; line-height: 1.1; }

  /* ── Welcome ── */
  .welcome {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: calc(var(--safe-top) + 36px) 28px 8px;
    background: radial-gradient(116% 52% at 50% 36%, var(--blush) 0%, var(--blush) 50%, var(--bg) 100%);
  }
  .welcome__logo {
    width: 100%;
    max-width: 314px;
  }
  .welcome__tag {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    line-height: 1.3;
    color: var(--ink);
    max-width: 17ch;
    margin: 14px auto 0;
  }
  .welcome__feats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin: 0 0 6px;
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.13em;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-2);
  }
  .welcome__feats span { white-space: nowrap; }
  .welcome__feats i {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--rose);
    opacity: 0.5;
    display: block;
    flex-shrink: 0;
  }
  .welcome__spacer { flex: 1; }
  .microhint {
    font-size: 12.5px;
    line-height: 1.45;
    color: var(--ink-soft);
    margin: 14px 0 2px;
    max-width: 42ch;
  }
  .handle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* ── Instagram CTA ── */
  .ig-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin: 18px auto 0;

  // How each service behaves on tap. "link" opens the app/site (note pre-filled

      url: function (h, code, amount) {
        return 'https://venmo.com/?txn=pay&audience=private&recipients=' +

    },

      prefix: '$',

      url: function (h, code, amount) {
        return 'https://cash.app/$' + encodeURIComponent(h) + (amount ? '/' + encodeURIComponent(amount) : '');

    },

  // Methods Paige has set up (loaded from Supabase). Each: { id, label, handle }.
  var PAY_METHODS = [];

  // ── State ──
  var STORAGE_KEY = 'pmn-order-v1';
  function blankData() {
    return {
      shape: '', sizes: {}, sizePreset: '', notes: '', inspoLink: '',
      name: '', email: '', phone: '',
      fulfillment: 'pickup', shipSpeed: 'standard',
      address1: '', address2: '', city: '', state: '', zip: '',
      tier: 'classic',
    };
  }
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { step: 0, data: blankData() };
      var parsed = JSON.parse(raw);
      return {
        step: typeof parsed.step === 'number' ? parsed.step : 0,
        data: Object.assign(blankData(), parsed.data || {}),
        lastOrder: parsed.lastOrder || null,
      };
    } catch (e) { return { step: 0, data: blankData() }; }
  }

  var init = loadState();
  var step = init.step;           // 0 welcome · 1 shape · 1.5 size · 2 design · 3 details · 3.5 ship speed · 4 confirm · 5 gallery · 6 payment
  var data = init.data;
  var photos = [];                // { id, url, blob, name } — not persisted
  var showErr = false;
  var sending = false;
  var lastOrder = init.lastOrder || null;  // { id, order_no }; persisted so the PM-### code survives a reload on the payment screen

  function orderLabel(no) { return 'PM-' + no; }

  // Full payment due now: set price + flat shipping + rush, as separate lines.
  // IMPORTANT: these amounts must match the create_order RPC in the DB, which
  // records ship_fee / rush_fee server-side so admin sees the same total.
  var SHIP_FEE = 7;   // flat shipping, charged on any ship-to-me order
  var RUSH_FEE = 10;  // rush production fee, charged on rush orders
  function selectedTier() {
    return TIERS.filter(function (t) { return t.id === data.tier; })[0] || TIERS[0];
  }
  function isShipping() {
    return data.fulfillment === 'shipping';
  }
  function isRush() {
    return data.fulfillment === 'shipping' && data.shipSpeed === 'rush';
  }
  function shipFee() { return isShipping() ? SHIP_FEE : 0; }
  function rushFee() { return isRush() ? RUSH_FEE : 0; }
  function totalAmount() {
    var price = Number(selectedTier().price) || 0;
    return price + shipFee() + rushFee();
  }
  // The order has no dedicated inspo-link column, so fold any link into the
  // notes the business/DB receives (keeps the RPC + email unchanged).
  function notesForSave() {
    var parts = [];
    if (data.notes.trim()) parts.push(data.notes.trim());
    if (data.inspoLink.trim()) parts.push('Inspo link: ' + data.inspoLink.trim());
    return parts.join('\n') || null;
  }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ step: step, data: data, lastOrder: lastOrder })); }
    catch (e) {}
  }
  function go(n) { step = n; showErr = false; render(); }

  var root = document.getElementById('root');

  // ── Small DOM helpers ──
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }
  function topBar(label, n, total) {
    var bar = el('div', 'topbar');
    bar.innerHTML =
      '<button type="button" class="iconbtn" data-back aria-label="Go back" style="color:var(--ink)">' + Icon.back + '</button>' +
      '<div class="progress">' +
        '<div class="progress__meta">' + label + ' · Step ' + n + ' of ' + total + '</div>' +
        '<div class="progress__track" role="progressbar" aria-valuemin="0" aria-valuemax="' + total + '" aria-valuenow="' + n + '"><div class="progress__bar" style="width:' + ((n/total)*100) + '%"></div></div>' +
      '</div>';
    return bar;
  }

  // ════════════════════════════════════════ render ════════
  function render() {
    persist();
    document.documentElement.setAttribute('data-step', step);
    root.innerHTML = '';
    if (step === 0) root.appendChild(WelcomeScreen());
    else if (step === 1) root.appendChild(ShapeScreen());
    else if (step === 1.5) root.appendChild(SizeScreen());
    else if (step === 2) root.appendChild(DesignScreen());
    else if (step === 3) root.appendChild(DetailsScreen());
    else if (step === 3.5) root.appendChild(ShipSpeedScreen());
    else if (step === 5) root.appendChild(GalleryScreen());
    else if (step === 6) root.appendChild(PaymentScreen());
    else root.appendChild(ConfirmationScreen());
    var sc = root.querySelector('.app__scroll');
    if (sc) sc.scrollTop = 0;
  }

  // ── 1.5 · SIZE (S/M/L presets + per-finger steppers) ──
  function SizeScreen() {
    var app = el('div', 'app step');
    app.appendChild(topBar('Size', 2, 4));

    var scroll = el('div', 'app__scroll');
    scroll.innerHTML =
      '<div class="sectionlead pad">' +
        '<div class="eyebrow">Find your fit</div>' +
        '<h1 class="title">Your sizes</h1>' +
      '</div>' +
      '<div class="pad"><div class="sizechips" data-chips></div></div>' +
      '<div class="hand card">' +
        '<div class="hand__head"><span class="hand__title">Each finger</span><span class="hand__count" data-count></span></div>' +
        '<div data-rows></div>' +
      '</div>' +
      '<div style="height:14px"></div>';

    var chipsWrap = scroll.querySelector('[data-chips]');
    var rows = scroll.querySelector('[data-rows]');
    var countEl = scroll.querySelector('[data-count]');
    var rowRefs = {}; // finger -> { val, dec, inc }

    function isSet(f) { return data.sizes[f] != null && data.sizes[f] !== ''; }
    function matchPreset() {
      for (var i = 0; i < SIZE_PRESET_NAMES.length; i++) {
        var name = SIZE_PRESET_NAMES[i];
        var all = FINGERS.every(function (f) { return data.sizes[f] === SIZE_PRESETS[name][f]; });
        if (all) return name;
      }
      return '';
    }
    function paint() {
      var count = 0;
      FINGERS.forEach(function (f) {
        var r = rowRefs[f];
        var set = isSet(f);
        if (set) count++;
        var v = set ? Number(data.sizes[f]) : null;
        r.val.textContent = set ? data.sizes[f] : '–';
        r.val.classList.toggle('unset', !set);
        r.dec.disabled = set && v <= SIZE_MIN;
        r.inc.disabled = set && v >= SIZE_MAX;
      });
      countEl.textContent = count + '/5 set';
      chipsWrap.querySelectorAll('.sizechip').forEach(function (c) {
        c.classList.toggle('on', c.getAttribute('data-preset') === data.sizePreset);
      });
      if (count === 5) clearErr();
    }
    function applyPreset(name) {
      FINGERS.forEach(function (f) { data.sizes[f] = SIZE_PRESETS[name][f]; });
      data.sizePreset = name;
      persist(); paint();
    }
    function bump(f, delta) {
      var next;
      if (!isSet(f)) {
        // Seed an untouched finger from Medium on first tap (sensible mid-point).
        next = Number(SIZE_PRESETS.Medium[f]);
      } else {
        next = Number(data.sizes[f]) + delta;
      }
      next = Math.max(SIZE_MIN, Math.min(SIZE_MAX, next));
      data.sizes[f] = String(next);
      data.sizePreset = matchPreset();
      persist(); paint();
    }

    // chips
    SIZE_PRESET_NAMES.forEach(function (name) {
      var c = el('button', 'sizechip' + (data.sizePreset === name ? ' on' : ''));
      c.setAttribute('data-preset', name);
      c.textContent = name;
      c.onclick = function () { applyPreset(name); };
      chipsWrap.appendChild(c);
    });

    // finger rows with +/- steppers
    FINGERS.forEach(function (f) {
      var row = el('div', 'frow');
      row.innerHTML =
        '<span class="finger">' + f + '</span>' +
        '<div class="stepper">' +
          '<button class="step__btn" type="button" data-dec aria-label="Lower size number">&minus;</button>' +
          '<span class="step__val"></span>' +
          '<button class="step__btn" type="button" data-inc aria-label="Higher size number">+</button>' +
        '</div>';
      var dec = row.querySelector('[data-dec]');
      var inc = row.querySelector('[data-inc]');
      dec.onclick = function () { bump(f, -1); };
      inc.onclick = function () { bump(f, 1); };
      rowRefs[f] = { val: row.querySelector('.step__val'), dec: dec, inc: inc };
      rows.appendChild(row);
    });

    // Default to Medium so the set arrives pre-filled; only when nothing is set
    // yet (don't clobber a customer who already picked/adjusted sizes).
    if (!FINGERS.some(isSet)) {
      applyPreset('Medium');
    } else {
      if (!data.sizePreset) data.sizePreset = matchPreset();
      paint();
    }

    app.appendChild(scroll);

    var footer = el('div', 'footer');
    footer.innerHTML =
      '<div class="footer__err" data-err></div>' +
      '<button class="btn" data-next>Continue' + Icon.arrow + '</button>';
    function clearErr() { var e = footer && footer.querySelector('[data-err]'); if (e) e.innerHTML = ''; }
    footer.querySelector('[data-next]').onclick = function () {
      if (FINGERS.some(function (f) { return !isSet(f); })) {
        footer.querySelector('[data-err]').innerHTML = '<div class="field__err">Please set a size for all five fingers — tap a preset to fill them fast.</div>';
        return;
      }
      go(2);
    };
    app.appendChild(footer);

    app.querySelector('[data-back]').onclick = function () { go(1); };
    return app;
  }

        strip.appendChild(add);
      }
      updateGate();
    }
    fileInput.onchange = function (e) {
      var files = Array.prototype.slice.call(e.target.files || []).slice(0, MAX_PHOTOS - photos.length);
      if (!files.length) { fileInput.value = ''; return; }
      optimising = true; renderPhotos();
      var jobs = files.map(function (file) {
        if (!/^image\//.test(file.type)) return Promise.resolve(null);
        return compressImage(file).then(function (blob) {
          return { id: Date.now() + Math.random(), url: URL.createObjectURL(blob), blob: blob };
        }).catch(function () { return null; });
      });
      Promise.all(jobs).then(function (res) {
        res.forEach(function (r) { if (r) photos.push(r); });
        fileInput.value = '';
        optimising = false; renderPhotos();
      });
    };
    app.appendChild(scroll);

    // Inspo is required, but a photo OR a link satisfies it. Gray out Continue
    // until one is present, with a line explaining why.

      var ok = hasInspo();

    nextBtn.onclick = function () { if (hasInspo()) go(3); };
    app.appendChild(footer);

    app.querySelector('[data-back]').onclick = function () { go(1.5); };
    return app;

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(function () { return legacyCopy(text); });

    return Promise.resolve(legacyCopy(text));
  }
  function legacyCopy(text) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    } catch (e) {}
  }

  // ── Image compression ──
  function compressImage(file) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function () {
        var w = img.naturalWidth, h = img.naturalHeight;
        if (w > h && w > MAX_DIM) { h = Math.round(h * MAX_DIM / w); w = MAX_DIM; }
        else if (h >= w && h > MAX_DIM) { w = Math.round(w * MAX_DIM / h); h = MAX_DIM; }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(function (blob) { blob ? resolve(blob) : reject(); }, 'image/jpeg', JPEG_QUALITY);
      };
      img.onerror = function () { URL.revokeObjectURL(url); reject(); };
      img.src = url;
    });
  }

    btn.innerHTML = '<span class="btn__spin" aria-hidden="true"></span>Sending…';

    var tier = TIERS.filter(function (t) { return t.id === data.tier; })[0] || TIERS[0];
    var sizesStr = FINGERS.map(function (f) { return f + ' ' + (data.sizes[f] || '—'); }).join('  ·  ');

    function emailOrder(orderNo) {
      var ref = orderNo != null ? orderLabel(orderNo) : null;
      var fd = new FormData();
      fd.append('_subject', 'New order' + (ref ? ' ' + ref : '') + ' — ' + data.name.trim());
      fd.append('_template', 'table');
      fd.append('_captcha', 'false');

      if (ref) fd.append('Order #', ref);
      fd.append('Name', data.name.trim());
      if (data.email.trim()) fd.append('Email', data.email.trim());
      if (data.phone.trim()) fd.append('Phone', data.phone.trim());

      fd.append('Delivery', data.fulfillment === 'shipping' ? 'Ship to me' : 'Booth pickup');
      if (data.fulfillment === 'shipping') {
        var addrBlock = [
          data.address1.trim(),
          data.address2.trim(),
          [data.city.trim(), data.state.trim(), data.zip.trim()].filter(Boolean).join(', '),
          'USA'
        ].filter(Boolean).join('\n');
        fd.append('Shipping address', addrBlock);
        fd.append('Shipping speed', data.shipSpeed === 'rush' ? 'Rush (about a week, +$10)' : 'Standard (2–3 weeks)');
      }

      fd.append('Nail shape', data.shape || 'Not selected');
      fd.append('Sizes (both hands)', sizesStr);
      fd.append('Design tier', tier.name + ' (' + money(tier.price) + ')');
      fd.append('Total due', money(totalAmount()) +
        ((shipFee() || rushFee())
          ? ' (' + money(Number(tier.price) || 0) + ' set' +
            (shipFee() ? ' + ' + money(SHIP_FEE) + ' ship' : '') +
            (rushFee() ? ' + ' + money(RUSH_FEE) + ' rush' : '') + ')'
          : ''));
      if (data.inspoLink.trim()) fd.append('Inspo link', data.inspoLink.trim());
      fd.append('Notes', data.notes.trim() || '—');

      photos.forEach(function (p, i) { fd.append('Photo ' + (i + 1), p.blob, 'design-' + (i + 1) + '.jpg'); });

      return fetch(FORMSUBMIT_ENDPOINT, { method: 'POST', body: fd, mode: 'no-cors' })
        .then(function () { return true; })
        .catch(function () { return false; });
    }

    // Save to Supabase first (the durable record + the order number),
    // then email via FormSubmit with that number included. If the DB
    // save fails, still email so the order isn't lost. Proceed to the
    // thank-you if either one succeeds.
    saveOrderToSupabase().then(function (order) {
      lastOrder = order;
      // Fire-and-forget the customer's "order received" confirmation. It's
      // best-effort: never awaited, never blocks the thank-you, and a failure
      // is silent to the customer (the business still gets its FormSubmit
      // alert). The edge fn only sends the "new" template to this order's own
      // email, so passing just the id is safe.
      if (order && order.id) {
        try {
          sb.functions.invoke('send-order-confirmation', { body: { order_id: order.id } })
            .catch(function () {});
        } catch (e) { /* ignore — confirmation email is best-effort */ }
      }
      return emailOrder(order.order_no).then(function (emailed) { return { db: true, emailed: emailed }; });
    }, function (e) {
      if (window.console) console.error('Supabase save failed:', e);
      lastOrder = null;
      return emailOrder(null).then(function (emailed) { return { db: false, emailed: emailed }; });
    }).then(function (r) {
      sending = false;
      if (!r.db && !r.emailed) {
        btn.disabled = false;
        btn.innerHTML = 'Submit my order' + Icon.arrow;
        hintEl.innerHTML = '<span style="color:var(--rose);font-weight:600">That didn\'t send — please check your connection and try again.</span>';
        return;
      }
      go(4);
    });
  }

  // boot
  render();
  loadReferenceData();
  </script>
</body>
</html>
