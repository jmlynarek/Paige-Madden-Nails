<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FAF6F2" />
<title>Paige Madden Nails — Custom Order</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
<link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FAF6F2;
    --blush: #FBEBEB;
    --rose: #B46869;
    --rose-deep: #8C4A4B;
    --dusty: #DC8289;
    --highlight: #F1BCBD;
    --ink: #5F463F;
    --ink-2: #8C6A60;
    --ink-soft: rgba(95, 70, 63, 0.62);
    --hair: rgba(95, 70, 63, 0.12);
    --line: rgba(95, 70, 63, 0.16);
    --rose-line: rgba(180, 104, 105, 0.25);
    --rose-30: rgba(180, 104, 105, 0.34);
    --surface: #FFFFFF;
    --shadow-sm: 0 1px 2px rgba(95,70,63,0.05), 0 6px 16px rgba(95,70,63,0.05);
    --shadow-cta: 0 10px 24px rgba(180,104,105,0.34);
    --ring: 0 0 0 4px rgba(180,104,105,0.08);
    --script: 'Pinyon Script', cursive;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Hanken Grotesk', system-ui, sans-serif;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: radial-gradient(125% 90% at 50% 0%, #F2ECE6 0%, #E7DDD4 100%);
    -webkit-font-smoothing: antialiased;
    color: var(--ink);
  }
  a { color: var(--rose); text-decoration: none; }
  a:hover { color: var(--rose-deep); }
  #root { min-height: 100%; }

  @keyframes reveal { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  @keyframes pop { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .rb-reveal { animation: reveal .32s cubic-bezier(.22,.61,.36,1) both; }
  @media (prefers-reduced-motion: reduce) {
    .rb-reveal, .rb-pop { animation: none !important; }
  }

  /* ── App shell (phone column, capped for larger screens) ── */
  .rb-app {
    height: 100vh;
    height: 100dvh;
    max-width: 460px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(95,70,63,0.06);
  }

  /* ── Shared button ── */
  .btn {
    width: 100%;
    min-height: 58px;
    border: none;
    border-radius: 18px;
    background: var(--rose);
    color: #fff;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.01em;
    white-space: nowrap;
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    cursor: pointer;
    box-shadow: var(--shadow-cta);
    transition: transform .12s ease, box-shadow .2s ease, opacity .2s ease;
  }
  .btn:active { transform: translateY(1.5px) scale(0.995); box-shadow: 0 6px 16px rgba(180,104,105,0.28); }
  .btn[disabled] { opacity: 0.38; box-shadow: none; cursor: default; pointer-events: none; }
  .btn__spin {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.45);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @media (prefers-reduced-motion: reduce) { .btn__spin { animation: none; } }

  /* Focus visibility (pointer taps stay ring-free) */
  .btn:focus-visible, .rb-shape:focus-visible, .rb-preset:focus-visible, .rb-chip:focus-visible,
  .rb-collapse:focus-visible, .rb-edit:focus-visible, .rb-seg button:focus-visible, .rb-opt:focus-visible,
  .rb-add:focus-visible, .rb-thumb__x:focus-visible, .rb-toggle:focus-visible, .rb-pill:focus-visible,
  .rb-code:focus-visible, .rb-paytile:focus-visible {
    outline: 2.5px solid var(--rose);
    outline-offset: 2px;
  }

  /* ════════════ WELCOME ════════════ */
  .rb-welcome { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .rb-welcome__body {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: calc(var(--safe-top) + 8px) 34px 8px; text-align: center;
  }
  .rb-welcome__logo { width: 230px; max-width: 74%; border-radius: 24px; mix-blend-mode: multiply; }
  .rb-welcome__tag {
    font-family: var(--serif); font-size: 24px; font-weight: 600; line-height: 1.3;
    color: var(--ink); margin-top: 18px;
  }
  .rb-welcome__strip {
    font-family: var(--serif); text-transform: uppercase; letter-spacing: 0.22em;
    font-size: 11px; font-weight: 600; color: rgba(95,70,63,0.55); margin-top: 22px;
  }
  .rb-welcome__foot { padding: 14px 26px calc(var(--safe-bottom) + 34px); }
  .rb-subhint { text-align: center; font-size: 13px; color: rgba(95,70,63,0.55); margin-top: 12px; }
  .rb-socials { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
  .rb-social {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 15px; border-radius: 99px; border: 1px solid var(--rose-30);
    background: rgba(255,255,255,0.6); color: var(--rose);
    font-size: 13px; font-weight: 600; box-shadow: var(--shadow-sm);
    transition: background .15s ease, transform .1s ease;
  }
  .rb-social:active { transform: scale(0.97); }

  /* ════════════ MAIN — header ════════════ */
  .rb-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(var(--safe-top) + 22px) 22px 12px; flex-shrink: 0;
  }
  .rb-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .rb-brand__logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; mix-blend-mode: multiply; flex-shrink: 0; }
  .rb-brand__name { font-family: var(--script); font-size: 26px; color: var(--rose); line-height: 1; }
  .rb-pill {
    display: flex; align-items: center; gap: 7px;
    background: var(--blush); border: 1px solid var(--rose-line); border-radius: 99px;
    padding: 7px 14px; font-size: 14px; font-weight: 700; color: var(--rose);
    white-space: nowrap; flex-shrink: 0;
  }

  /* ── Scroll area ── */
  .rb-scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 4px 22px 4px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .rb-tail { flex-shrink: 0; height: 42dvh; }

  /* ── Receipt row ── */
  .rb-row {
    background: var(--surface); border-radius: 18px; box-shadow: var(--shadow-sm);
    padding: 2px 18px;
  }
  .rb-row__in { display: flex; align-items: center; gap: 12px; padding: 11px 0; }
  .rb-row__ico { width: 26px; display: flex; justify-content: center; flex-shrink: 0; color: var(--rose); }
  .rb-row__ico img { width: 26px; height: 34px; object-fit: contain; }
  .rb-row__body { flex: 1; min-width: 0; }
  .rb-row__label { font-size: 11.5px; color: rgba(95,70,63,0.55); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .rb-row__val { font-size: 14.5px; font-weight: 700; margin-top: 1px; }
  .rb-row__val.rose { color: var(--rose); }
  .rb-edit {
    border: none; background: none; padding: 6px 2px;
    font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--rose); cursor: pointer;
  }

  /* ── Active editor card ── */
  .rb-card {
    background: var(--surface); border: 1.5px solid rgba(180,104,105,0.45);
    border-radius: 22px; box-shadow: var(--ring); padding: 18px;
  }
  .rb-card__head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .rb-card__title { font-family: var(--serif); font-size: 22px; font-weight: 600; }
  .rb-card__right { display: flex; align-items: center; gap: 9px; }
  .rb-card__meta { font-size: 12px; font-weight: 600; color: rgba(95,70,63,0.5); }
  .rb-collapse {
    width: 28px; height: 28px; padding: 0; border: 1px solid var(--hair);
    border-radius: 50%; background: var(--bg);
    display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
  }
  .rb-caption { font-size: 12.5px; color: rgba(95,70,63,0.55); margin-top: 12px; text-align: center; }

  /* ── Upcoming placeholder ── */
  .rb-up {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    border: 1.5px dashed rgba(95,70,63,0.25); border-radius: 18px; opacity: 0.55;
  }
  .rb-up__n {
    width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid rgba(95,70,63,0.3);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .rb-up__label { font-size: 15.5px; font-weight: 600; }

  /* ── Shape grid ── */
  .rb-shapes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 13px; }
  .rb-shape {
    background: #fff; border: 1px solid var(--line); border-radius: 18px;
    padding: 12px 8px 10px; text-align: center; cursor: pointer; font-family: var(--sans);
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .rb-shape:active { transform: scale(0.98); }
  .rb-shape.on { border: 1.5px solid var(--rose); background: #FBF1F0; }
  .rb-shape img { height: 60px; object-fit: contain; display: block; margin: 0 auto; }
  .rb-shape__name { font-size: 13.5px; font-weight: 700; margin-top: 5px; color: var(--ink); }
  .rb-shape.on .rb-shape__name { color: var(--rose); }

  /* ── Size presets ── */
  .rb-presets { display: flex; gap: 9px; margin-top: 14px; }
  .rb-preset {
    flex: 1; position: relative; border: 1px solid var(--line); background: #fff;
    border-radius: 14px; padding: 12px 0; text-align: center;
    font-family: var(--sans); font-weight: 700; font-size: 15px; color: rgba(95,70,63,0.8); cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .rb-preset.on { border: 1.5px solid var(--rose); background: #FBF1F0; color: var(--rose); }
  .rb-badge {
    position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
    background: var(--rose); color: #fff; font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em;
    border-radius: 99px; padding: 2px 8px; white-space: nowrap;
  }
  .rb-fine { margin-top: 12px; }
  .rb-note {
    font-size: 12.5px; line-height: 1.4; color: rgba(95,70,63,0.65);
    background: var(--bg); border-radius: 11px; padding: 9px 12px;
  }
  .rb-finger { padding: 9px 0 10px; border-bottom: 1px solid var(--hair); }
  .rb-finger__top { display: flex; align-items: baseline; justify-content: space-between; }
  .rb-finger__name { font-size: 13.5px; font-weight: 600; }
  .rb-finger__val { font-size: 11.5px; font-weight: 600; color: rgba(95,70,63,0.5); }
  .rb-chips { display: flex; gap: 3px; margin-top: 7px; }
  .rb-chip {
    width: 23px; height: 23px; padding: 0; border-radius: 50%;
    border: 1px solid var(--line); background: #fff; color: rgba(95,70,63,0.7);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans); font-size: 11px; font-weight: 700; cursor: pointer;
  }
  .rb-chip.on { background: var(--rose); color: #fff; border-color: var(--rose); }
  .rb-confirm {
    width: 100%; margin-top: 12px; min-height: 46px; border: none; border-radius: 14px;
    background: var(--rose); color: #fff; font-family: var(--sans); font-weight: 600; font-size: 15px;
    cursor: pointer; box-shadow: 0 6px 16px rgba(180,104,105,0.28);
  }
  .rb-set {
    display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 12px;
    min-height: 42px; border-radius: 14px; background: #FBF1F0; font-size: 14px; font-weight: 700; color: var(--rose);
  }
  .rb-help {
    margin-top: 13px; background: var(--bg); border-radius: 12px; padding: 10px 13px;
    font-size: 13px; line-height: 1.45; color: rgba(95,70,63,0.7);
  }
  .rb-help a { font-weight: 600; }

  /* ── Inspo (design) ── */
  .rb-drop {
    border: 1.5px dashed rgba(180,104,105,0.4); background: #FDF8F6; border-radius: 16px;
    padding: 14px; margin-top: 13px; display: flex; align-items: center; gap: 11px; flex-wrap: wrap;
    cursor: pointer; transition: border-color .15s ease, background .15s ease;
  }
  .rb-drop.full { cursor: default; }
  .rb-drop.drag { border-color: var(--rose); background: #FBF1F0; }
  .rb-thumb { width: 64px; height: 64px; border-radius: 12px; overflow: hidden; position: relative; flex-shrink: 0; box-shadow: var(--shadow-sm); }
  .rb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rb-thumb__x {
    position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; padding: 0;
    border: none; border-radius: 50%; background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer;
  }
  .rb-add {
    width: 64px; height: 64px; border-radius: 12px; border: 1.5px dashed rgba(95,70,63,0.3);
    background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    color: rgba(95,70,63,0.55); cursor: pointer; font-family: var(--sans); flex-shrink: 0; padding: 0;
  }
  .rb-add__t { font-size: 10.5px; font-weight: 600; }
  .rb-req { flex: 1; min-width: 120px; font-size: 12.5px; line-height: 1.4; color: rgba(95,70,63,0.65); }
  .rb-price {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 11px;
    background: linear-gradient(140deg,#FBF1F0,#F6DEDF); border: 1px solid rgba(180,104,105,0.28);
    border-radius: 99px; padding: 8px 14px; box-shadow: 0 4px 12px rgba(180,104,105,0.12);
  }
  .rb-price__star { color: var(--rose); font-size: 13px; }
  .rb-price__t { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .rb-price__t b { color: var(--rose); }
  .rb-price__sub { font-size: 11.5px; color: rgba(95,70,63,0.55); }
  .rb-toggle {
    display: flex; align-items: center; gap: 10px; margin-top: 12px;
    border: none; background: none; padding: 2px 0; cursor: pointer; font-family: var(--sans); text-align: left;
  }
  .rb-track { width: 38px; height: 22px; border-radius: 99px; background: rgba(95,70,63,0.18); position: relative; flex-shrink: 0; transition: background .15s ease; }
  .rb-track.on { background: var(--rose); }
  .rb-knob { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(95,70,63,0.25); transition: left .15s ease; }
  .rb-track.on .rb-knob { left: 19px; }
  .rb-toggle__t { font-size: 13px; color: rgba(95,70,63,0.75); }
  .rb-toggle__t b { color: var(--rose); }
  .rb-subline { font-size: 12px; color: rgba(95,70,63,0.55); margin: 5px 0 0 48px; }
  .rb-ta {
    width: 100%; box-sizing: border-box; border: 1px solid var(--line); background: #fff;
    border-radius: 13px; padding: 12px 14px; min-height: 64px; font-family: var(--sans);
    font-size: 14px; color: var(--ink); outline: none; resize: none; margin-top: 12px;
  }
  .rb-ta:focus { border-color: var(--rose); box-shadow: 0 0 0 3.5px rgba(180,104,105,0.13); }

  /* ── Delivery & payment ── */
  .rb-inp {
    border: 1px solid var(--line); background: #fff; border-radius: 13px; padding: 0 13px; height: 48px;
    font-family: var(--sans); font-size: 15px; color: var(--ink); outline: none; width: 100%;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .rb-inp:focus { border-color: var(--rose); box-shadow: 0 0 0 3.5px rgba(180,104,105,0.13); }
  .rb-inp.err { border-color: var(--dusty); box-shadow: 0 0 0 3.5px rgba(220,130,137,0.16); }
  .rb-2 { display: flex; gap: 10px; margin-top: 13px; }
  .rb-2--tight { margin-top: 10px; }
  .rb-name { flex: 1; min-width: 0; }
  .rb-phone { width: 130px; flex-shrink: 0; }
  select.rb-sel {
    -webkit-appearance: none; appearance: none;
    width: 74px; flex-shrink: 0; border: 1px solid var(--line); background: #fff; border-radius: 13px;
    padding: 0 10px; height: 48px; font-family: var(--sans); font-size: 15px; font-weight: 600; color: var(--ink);
    outline: none; cursor: pointer;
  }
  select.rb-sel:focus { border-color: var(--rose); box-shadow: 0 0 0 3.5px rgba(180,104,105,0.13); }
  .rb-zip { width: 92px; flex-shrink: 0; }
  .rb-seg { display: flex; background: #EFE8E1; border-radius: 14px; padding: 4px; margin-top: 12px; }
  .rb-seg button {
    flex: 1; border: none; text-align: center; padding: 10px 0; border-radius: 11px; background: transparent;
    font-family: var(--sans); font-size: 14px; font-weight: 600; color: rgba(95,70,63,0.65); cursor: pointer;
    transition: color .15s ease;
  }
  .rb-seg button.on { background: #fff; color: var(--rose); font-weight: 700; box-shadow: 0 2px 8px rgba(95,70,63,0.1); }
  .rb-turn { display: flex; gap: 9px; margin-top: 12px; }
  .rb-opt {
    flex: 1; border: 1px solid var(--line); background: #fff; border-radius: 13px; padding: 10px 12px;
    text-align: left; cursor: pointer; font-family: var(--sans);
    transition: border-color .15s ease, background .15s ease;
  }
  .rb-opt.on { border: 1.5px solid var(--rose); background: #FBF1F0; }
  .rb-opt__t { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .rb-opt.on .rb-opt__t { color: var(--rose); }
  .rb-opt__s { font-size: 11.5px; color: rgba(95,70,63,0.6); margin-top: 2px; }
  .rb-gift { margin-top: 13px; }
  .rb-gift__label { font-size: 12.5px; font-weight: 600; color: var(--ink); margin-bottom: 7px; }
  .rb-gift__label .opt { font-weight: 500; color: var(--ink-soft); }
  .rb-gift__row { display: flex; gap: 8px; }
  .rb-gift__apply {
    border: 1px solid var(--rose-30); background: #fff; color: var(--rose); border-radius: 13px;
    padding: 0 16px; height: 48px; font-family: var(--sans); font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap;
  }
  .rb-gift__msg { font-size: 12.5px; margin-top: 8px; }
  .rb-gift__msg .ok { color: var(--rose); font-weight: 600; }
  .rb-gift__msg .muted { color: var(--ink-soft); }
  .rb-gift__remove { background: none; border: 0; color: var(--ink-soft); text-decoration: underline; cursor: pointer; font: inherit; padding: 0; margin-left: 6px; }
  .rb-sum { background: var(--blush); border-radius: 14px; padding: 12px 15px; margin-top: 13px; }
  .rb-sum__row { display: flex; justify-content: space-between; font-size: 13px; color: rgba(95,70,63,0.7); }
  .rb-sum__row + .rb-sum__row { margin-top: 4px; }
  .rb-sum__total {
    display: flex; justify-content: space-between; font-size: 15.5px; font-weight: 700;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(180,104,105,0.2);
  }
  .rb-sum__total .amt { color: var(--rose); }

  /* ── Footer CTA ── */
  .rb-foot {
    flex-shrink: 0; padding: 12px 24px calc(var(--safe-bottom) + 26px);
    background: linear-gradient(180deg, rgba(250,246,242,0) 0%, var(--bg) 30%);
  }
  .rb-foot__hint { text-align: center; font-size: 12.5px; color: rgba(95,70,63,0.55); margin-top: 11px; }

  /* ════════════ SUBMITTED / payment ════════════ */
  .rb-done {
    flex: 1; display: flex; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 26px calc(var(--safe-bottom) + 20px);
  }
  .rb-done__top { text-align: center; padding-top: calc(var(--safe-top) + 52px); }
  .rb-seal {
    width: 64px; height: 64px; border-radius: 50%; background: var(--rose);
    display: flex; align-items: center; justify-content: center; margin: 0 auto;
    box-shadow: 0 10px 24px rgba(180,104,105,0.3);
  }
  .rb-done__title { font-family: var(--serif); font-weight: 600; font-size: 32px; margin: 18px 0 0; }
  .rb-done__title .script { font-family: var(--script); font-weight: 400; font-size: 1.2em; }
  .rb-done__sub { font-size: 14.5px; line-height: 1.5; color: rgba(95,70,63,0.65); margin: 10px 0 0; }
  .rb-total {

  // ── State (data.* names kept so the Supabase RPC call is unchanged) ──

    try {

      if (!raw) return { step: 'welcome', data: blankData() };

      return {

        data: Object.assign(blankData(), parsed.data || {}),

      (canCollapse ? '<button class="rb-collapse" type="button" data-collapse aria-label="Collapse">' + Icon.chevUp + '</button>' : '') +
      '</div></div>';
  }

  function sizeAdjusted() {
    if (!data.sizePreset || !SIZE_PRESETS[data.sizePreset]) return false;
    return FINGERS.some(function (f) { return data.sizes[f] !== SIZE_PRESETS[data.sizePreset][f]; });

  // ── Section 2 · SIZES ──
  function sizeEditor(animate) {
    var card = el('div', 'rb-card' + (animate ? ' rb-reveal' : ''));
    curActiveCard = card;
    card.innerHTML = cardHead('Your Sizes', 2, data.sizeConfirmed) +
      '<div class="rb-presets" data-presets></div>' +
      '<div data-fine></div>' +
      '<div class="rb-help">Not sure what size? <a href="' + SIZE_VIDEO_URL + '" target="_blank" rel="noopener">Watch this video</a> to confirm your fit.</div>';

    var presetsWrap = card.querySelector('[data-presets]');
    var fineWrap = card.querySelector('[data-fine]');

    function paintPresets() {
      presetsWrap.querySelectorAll('.rb-preset').forEach(function (b) {
        b.classList.toggle('on', b.getAttribute('data-preset') === data.sizePreset);
      });
    }
    SIZE_PRESET_NAMES.forEach(function (name) {
      var b = el('button', 'rb-preset' + (data.sizePreset === name ? ' on' : ''));
      b.type = 'button';
      b.setAttribute('data-preset', name);
      b.innerHTML = name + (name === 'Small' ? '<span class="rb-badge">MOST PICKED</span>' : '');
      b.onclick = function () {
        FINGERS.forEach(function (f) { data.sizes[f] = SIZE_PRESETS[name][f]; });
        data.sizePreset = name;
        data.sizeConfirmed = false;   // re-picking a preset asks to re-confirm
        persist(); paintPresets(); renderFine(); paintFooter();
      };
      presetsWrap.appendChild(b);
    });

    function renderFine() {
      if (!data.sizePreset) { fineWrap.innerHTML = ''; return; }
      var html = '<div class="rb-fine rb-reveal"><div class="rb-note" data-note></div>';
      FINGERS.forEach(function (f) {
        html += '<div class="rb-finger" data-finger="' + f + '">' +
          '<div class="rb-finger__top"><span class="rb-finger__name">' + f + '</span><span class="rb-finger__val" data-fval>size ' + (data.sizes[f] != null ? data.sizes[f] : '–') + '</span></div>' +
          '<div class="rb-chips" data-chips></div></div>';
      });
      html += '<div data-confirm></div></div>';
      fineWrap.innerHTML = html;
      fineWrap.querySelector('[data-note]').textContent = 'These are our ' + data.sizePreset + ' defaults — tap any number to adjust.';

      FINGERS.forEach(function (f) {
        var block = fineWrap.querySelector('[data-finger="' + f + '"]');
        var chips = block.querySelector('[data-chips]');
        var readout = block.querySelector('[data-fval]');
        for (var n = 0; n <= SIZE_MAX; n++) (function (n) {
          var c = el('button', 'rb-chip' + (String(n) === data.sizes[f] ? ' on' : ''));
          c.type = 'button'; c.textContent = n;
          c.onclick = function () {
            data.sizes[f] = String(n);
            data.sizePreset = matchPreset();
            persist();
            chips.querySelectorAll('.rb-chip').forEach(function (x, i) { x.classList.toggle('on', i === n); });
            readout.textContent = 'size ' + n;
            paintPresets();
          };
          chips.appendChild(c);
        })(n);
      });

      renderConfirm();
    }
    function renderConfirm() {
      var box = fineWrap.querySelector('[data-confirm]');
      if (!box) return;
      if (data.sizeConfirmed) {
        box.innerHTML = '<div class="rb-set">' + Icon.checkSm + 'Sizes set</div>';
        var setEl = box.querySelector('.rb-set'); if (setEl) setEl.style.color = 'var(--rose)';
      } else {
        box.innerHTML = '<button class="rb-confirm" type="button">Yes, continue</button>';
        box.querySelector('.rb-confirm').onclick = function () {
          data.sizeConfirmed = true; data.active = nextIncomplete(); renderMain({ advance: true });
        };
      }
    }

    renderFine();
    wireCollapse(card);
    return card;
  }
  function matchPreset() {
    for (var i = 0; i < SIZE_PRESET_NAMES.length; i++) {
      var name = SIZE_PRESET_NAMES[i];
      if (FINGERS.every(function (f) { return data.sizes[f] === SIZE_PRESETS[name][f]; })) return name;
    }
    return '';   // adjusted off a preset
  }

  // ── Section 3 · INSPO / design ──
  function designEditor(animate) {
    var card = el('div', 'rb-card' + (animate ? ' rb-reveal' : ''));
    curActiveCard = card;
    card.innerHTML = cardHead('Your Inspo', 3, data.designDone) +
      '<input type="file" accept="image/*" multiple data-file style="display:none" />' +
      '<div class="rb-drop" data-drop></div>' +
      '<div data-price></div>' +
      '<button class="rb-toggle" type="button" data-toggle>' +
        '<span class="rb-track"><span class="rb-knob"></span></span>' +
        '<span class="rb-toggle__t">No nail art — 1–2 solid colors <b>$40</b></span>' +
      '</button>' +
      '<div data-subline></div>' +
      '<textarea class="rb-ta" data-notes placeholder="Notes or requests · optional"></textarea>';

    var fileInput = card.querySelector('[data-file]');
    var drop = card.querySelector('[data-drop]');
    var priceWrap = card.querySelector('[data-price]');
    var toggle = card.querySelector('[data-toggle]');
    var sublineWrap = card.querySelector('[data-subline]');
    var notesEl = card.querySelector('[data-notes]');
    var optimising = false;

    notesEl.value = data.notes;
    notesEl.oninput = function () { data.notes = notesEl.value; persist(); };

    function paintPrice() {
      var t = selectedTier();
      priceWrap.innerHTML = hasPhoto()
        ? '<span class="rb-price rb-pop" style="animation:pop .3s ease both"><span class="rb-price__star">✦</span>' +
            '<span class="rb-price__t">' + t.name + ' <b>' + money(basePrice()) + '</b></span>' +
            '<span class="rb-price__sub">· ' + (data.simpleColors ? 'solid colors' : 'from your photos') + '</span></span>'
        : '';
    }
    function paintToggle() {
      toggle.querySelector('.rb-track').classList.toggle('on', data.simpleColors);
      sublineWrap.innerHTML = data.simpleColors
        ? '<div class="rb-subline rb-reveal">Your photos are used for color reference only.</div>' : '';
    }
    function renderDrop() {
      drop.innerHTML = '';
      drop.classList.toggle('full', photos.length >= MAX_PHOTOS);
      photos.forEach(function (p) {
        var th = el('div', 'rb-thumb');
        th.innerHTML = '<img src="' + p.url + '" alt="inspiration" /><button type="button" class="rb-thumb__x" aria-label="Remove photo">✕</button>';
        th.querySelector('.rb-thumb__x').onclick = function (e) {
          e.stopPropagation();   // don't also open the picker (zone click below)
          URL.revokeObjectURL(p.url);
          photos = photos.filter(function (x) { return x.id !== p.id; });
          renderDrop(); paintPrice(); paintFooter();
        };
        drop.appendChild(th);
      });
      if (photos.length < MAX_PHOTOS) {
        var add = el('div', 'rb-add');
        add.setAttribute('aria-hidden', 'true');   // the whole zone is the button (see drop.onclick)
        add.innerHTML = optimising ? '<span class="rb-add__t">…</span>' : Icon.plus + '<span class="rb-add__t">Add</span>';
        drop.appendChild(add);
      }
      if (!photos.length) drop.appendChild(el('div', 'rb-req', 'REQUIRED · tap to add or drop a photo here.'));
    }

    // One path for both the file picker and drag-and-drop. Non-images and
    // anything past the 2-photo cap are ignored.
    function ingest(fileList) {
      var files = Array.prototype.slice.call(fileList || [])
        .filter(function (f) { return /^image\//.test(f.type); })
        .slice(0, MAX_PHOTOS - photos.length);
      if (!files.length) return;
      optimising = true; renderDrop();
      Promise.all(files.map(function (file) {
        return compressImage(file).then(function (blob) {
          return { id: Date.now() + Math.random(), url: URL.createObjectURL(blob), blob: blob };
        }).catch(function () { return null; });
      })).then(function (res) {
        res.forEach(function (r) { if (r) photos.push(r); });
        optimising = false; renderDrop(); paintPrice(); paintFooter();
      });
    }
    fileInput.onchange = function (e) { ingest(e.target.files); fileInput.value = ''; };

    // Whole zone is the tap target (mobile) and a drop target (desktop).
    drop.onclick = function (e) {
      if (e.target.closest('.rb-thumb__x')) return;
      if (!optimising && photos.length < MAX_PHOTOS) fileInput.click();
    };
    drop.setAttribute('role', 'button');
    drop.setAttribute('tabindex', '0');
    drop.onkeydown = function (e) {
      if ((e.key === 'Enter' || e.key === ' ') && !optimising && photos.length < MAX_PHOTOS) { e.preventDefault(); fileInput.click(); }
    };
    drop.ondragover = function (e) { e.preventDefault(); if (photos.length < MAX_PHOTOS) drop.classList.add('drag'); };
    drop.ondragleave = function (e) { if (!drop.contains(e.relatedTarget)) drop.classList.remove('drag'); };
    drop.ondrop = function (e) {
      e.preventDefault(); drop.classList.remove('drag');
      if (e.dataTransfer && e.dataTransfer.files) ingest(e.dataTransfer.files);
    };
    toggle.onclick = function () {
      data.simpleColors = !data.simpleColors; syncTier(); persist();
      paintToggle(); paintPrice(); paintPill(); paintFooter();
    };

    renderDrop(); paintPrice(); paintToggle();
    wireCollapse(card);
    return card;
  }

  function deliveryEditor(animate) {

        '<button type="button" data-ful="pickup">Pickup · free</button>' +

    var nameEl = card.querySelector('[data-name]');
    var phoneEl = card.querySelector('[data-phone]');
    var addrWrap = card.querySelector('[data-addr]');
    var sumEl = card.querySelector('[data-sum]');
    var giftEl = card.querySelector('[data-gift]');
    var giftMsg = card.querySelector('[data-gift-msg]');

    nameEl.value = data.name; phoneEl.value = data.phone; giftEl.value = data.giftCode || '';
    nameEl.oninput = function () { data.name = nameEl.value; persist(); paintFooter(); };
    phoneEl.oninput = function () {

      var v = d;
      if (d.length > 6) v = d.slice(0, 3) + '-' + d.slice(3, 6) + '-' + d.slice(6);
      else if (d.length > 3) v = d.slice(0, 3) + '-' + d.slice(3);
      data.phone = v; phoneEl.value = v; persist(); paintFooter();
    };

    function paintSeg() {
      card.querySelectorAll('[data-ful]').forEach(function (b) {
        var on = b.getAttribute('data-ful') === data.fulfillment;
        b.classList.toggle('on', on); b.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
    }
    function paintTurn() {
      card.querySelectorAll('[data-speed]').forEach(function (b) {
        b.classList.toggle('on', b.getAttribute('data-speed') === data.shipSpeed);
      });
    }
    function renderAddr() {
      if (!isShipping()) { addrWrap.innerHTML = ''; return; }
      addrWrap.innerHTML =
        '<div class="rb-reveal">' +
          '<input class="rb-inp" data-street placeholder="Street address *" autocomplete="address-line1" style="margin-top:10px" />' +
          '<div class="rb-2 rb-2--tight">' +
            '<input class="rb-inp rb-name" data-city placeholder="City *" autocomplete="address-level2" />' +
            '<select class="rb-sel" data-state autocomplete="address-level1"></select>' +
            '<input class="rb-inp rb-zip" data-zip placeholder="Zip *" inputmode="numeric" autocomplete="postal-code" maxlength="10" />' +
          '</div>' +
        '</div>';
      var stateSel = addrWrap.querySelector('[data-state]');
      STATES.forEach(function (st) {
        var o = document.createElement('option'); o.value = st; o.textContent = st;
        if (st === data.state) o.selected = true;
        stateSel.appendChild(o);
      });
      var map = [['[data-street]', 'address1'], ['[data-city]', 'city'], ['[data-zip]', 'zip']];
      map.forEach(function (pair) {
        var inp = addrWrap.querySelector(pair[0]);
        inp.value = data[pair[1]] || '';

        paintTurn(); paintSum(sumEl); paintPill(); paintFooter();

    });

    // Gift code (read-only preview via check_gift_card; the burn is server-side in create_order)
    function paintGiftMsg() {
      if (giftCredit() > 0) {
        giftMsg.innerHTML = '<span class="ok">🎁 ' + money(giftCredit()) + ' credit applied</span> · due ' + money(amountDue()) +
          ' <button type="button" class="rb-gift__remove" data-gift-remove>Remove</button>';
        var rm = giftMsg.querySelector('[data-gift-remove]');
        if (rm) rm.onclick = function () {
          data.giftCode = ''; data.giftCredit = 0; giftEl.value = ''; persist();
          giftMsg.innerHTML = ''; paintSum(sumEl); paintPill(); paintFooter();
        };
      } else giftMsg.innerHTML = '';
    }
    giftEl.oninput = function () { giftEl.value = giftEl.value.toUpperCase(); };
    card.querySelector('[data-gift-apply]').onclick = function () {
      var codeRaw = (giftEl.value || '').trim().toUpperCase();
      if (!codeRaw) { data.giftCode = ''; data.giftCredit = 0; persist(); paintGiftMsg(); paintSum(sumEl); paintPill(); paintFooter(); return; }
      if (!sb) { giftMsg.innerHTML = '<span class="muted">Can’t check right now — you can still submit.</span>'; return; }
      giftMsg.innerHTML = '<span class="muted">Checking…</span>';

  // ── Footer state machine (no AI: tier is the solid-colors toggle) ──
  function computeFooter() {
    var a = data.active;
    if (a === 1) return { label: 'Pick your shape', enabled: false, hint: 'Your total updates as you pick' };
    if (a === 2) {
      if (!data.sizePreset) return { label: 'Pick your sizes', enabled: false, hint: 'Small, Medium, or Large — then adjust any finger' };
      if (!data.sizeConfirmed) return { label: 'Continue', enabled: false, hint: 'Confirm your sizes above to continue' };
      return { label: 'Continue', enabled: true, hint: 'Free sizing card included with every kit',
        go: function () { data.active = nextIncomplete(); renderMain({ advance: true }); } };
    }
    if (a === 3) {
      var advance = function () { data.designDone = true; data.active = 4; renderMain({ advance: true }); };
      if (data.simpleColors) {
        return hasPhoto()
          ? { label: 'Continue — ' + money(40), enabled: true, hint: 'Classic set · 1–2 solid colors — $40', go: advance }
          : { label: 'Continue — ' + money(40), enabled: false, hint: 'Add at least one photo so Paige gets the exact shade' };
      }
      return hasPhoto()
        ? { label: 'Continue — ' + money(50), enabled: true, hint: 'Custom set · priced from your inspo — Paige confirms', go: advance }
        : { label: 'Continue', enabled: false, hint: 'Add a photo so Paige knows the vibe' };
    }
    // section 4
    var digits = data.phone.replace(/\D/g, '');
    var ok = !!data.name.trim() && digits.length === 10 &&
      (!isShipping() || (data.address1.trim() && data.city.trim() && data.state.trim() && data.zip.trim()));
    var due = amountDue();
    return {
      label: sending ? 'Sending…' : (due > 0 ? 'Submit & pay ' + money(due) : 'Submit my order'),
      enabled: ok && !sending,
      spin: sending,
      hint: ok ? 'Your set starts once payment lands' : 'Name + phone is all Paige needs',
      go: function () {
        if (sending) return;
        if (photos.length && photos.reduce(function (s, p) { return s + p.blob.size; }, 0) > TOTAL_LIMIT) {
          if (curFootHint) curFootHint.innerHTML = '<span style="color:var(--rose);font-weight:600">Your photos are a little large — remove one on the Inspo step.</span>';
          return;
        }
        submitOrder();
      },
    };
  }
  function paintFooter() {
    if (!curFootBtn) return;
    var f = computeFooter();
    curFootBtn.innerHTML = (f.spin ? '<span class="btn__spin" aria-hidden="true"></span>' : '') + esc(f.label);
    curFootBtn.disabled = !f.enabled;
    curFootBtn.onclick = f.go || null;
    if (curFootHint) curFootHint.textContent = f.hint || '';
  }

  // ════════════════════════════════════════ SUBMITTED / payment ════════
  function SubmittedScreen() {
    var app = el('div', 'rb-app');
    var code = (lastOrder && lastOrder.order_no != null) ? orderLabel(lastOrder.order_no) : null;
    var total = amountDue();
    var paidInFull = total === 0 && giftCredit() > 0;
    var amountParam = total ? String(total) : '';

    var tiles = PAY_METHODS.map(function (m) {
      var brand = PAY_BRAND[m.id];
      var raw = m.handle.trim();
      var clean = raw.replace(brand.strip, '');
      var display = brand.prefix + clean;
      var logo = PayLogo[m.id] || '';
      if (brand.mode === 'link') {
        var href = brand.url(clean, code || '', amountParam);
        return '<a class="rb-paytile" href="' + esc(href) + '" target="_blank" rel="noopener">' + logo +
          '<div class="rb-paytile__body"><div class="rb-paytile__name">' + esc(m.label) + '</div><div class="rb-paytile__handle">' + esc(display) + '</div></div>' +
          '<span class="rb-paytile__act">Open ' + Icon.extern + '</span></a>';
      }
      return '<button class="rb-paytile" type="button" data-copyhandle="' + esc(raw) + '">' + logo +
        '<div class="rb-paytile__body"><div class="rb-paytile__name">' + esc(m.label) + '</div><div class="rb-paytile__handle">' + esc(display) + '</div></div>' +
        '<span class="rb-paytile__act"><span class="rb-paytile__act-txt">Copy</span>' + Icon.copy + '</span></button>';
    }).join('');

    app.innerHTML =
      '<div class="rb-done">' +
        '<div class="rb-done__top">' +
          '<div class="rb-seal rb-pop" style="animation:pop .35s ease both">' + Icon.checkBig + '</div>' +
          '<h2 class="rb-done__title">Order <span class="script">in!</span></h2>' +
          '<p class="rb-done__sub">' + (paidInFull
            ? 'You’re all set — Paige will reach out to confirm your design.'
            : 'One last thing — send your payment so<br>Paige can get started.') + '</p>' +
        '</div>' +
        '<div class="rb-total">' +
          '<div class="rb-total__label">Total due now</div>' +
          '<div class="rb-total__amt">' + esc(money(total)) + '</div>' +
          (code ?
            '<button class="rb-code" type="button" data-copy="' + esc(code) + '"><span class="rb-code__t">' + esc(code) + '</span><span class="rb-code__ico">' + Icon.copy + '</span></button>' +
            '<div class="rb-total__note">Add <b>' + esc(code) + '</b> to your payment note so Paige can match it.</div>'
            : '<div class="rb-total__note" style="margin-top:12px">Your set starts once the <b>full amount</b> is received.</div>') +
        '</div>' +
        (paidInFull
          ? '<p class="rb-empty">🎁 Nothing to pay — your gift card covers it.</p>'
          : (PAY_METHODS.length
            ? '<div class="rb-pays">' + tiles + '</div>'
            : '<p class="rb-empty">Paige will send her payment details with your confirmation.</p>')) +
        '<div class="rb-done__foot">Paige texts you within 24 hours to confirm your design 🤍</div>' +
        '<button class="rb-restart" type="button" data-restart>Start another order</button>' +
      '</div>';

    var copyBtn = app.querySelector('[data-copy]');
    if (copyBtn) copyBtn.onclick = function () {
      var t = copyBtn.querySelector('.rb-code__t'), ico = copyBtn.querySelector('.rb-code__ico'), orig = t.textContent;
      copyText(copyBtn.getAttribute('data-copy')).then(function () {
        copyBtn.classList.add('copied'); t.textContent = 'Copied'; ico.innerHTML = Icon.checkSm;
        setTimeout(function () { copyBtn.classList.remove('copied'); t.textContent = orig; ico.innerHTML = Icon.copy; }, 1500);
      });
    };
    app.querySelectorAll('[data-copyhandle]').forEach(function (b) {
      b.onclick = function () {
        var txt = b.querySelector('.rb-paytile__act-txt'), orig = txt ? txt.textContent : '';
        copyText(b.getAttribute('data-copyhandle')).then(function () {
          b.classList.add('copied'); if (txt) txt.textContent = 'Copied';
          setTimeout(function () { b.classList.remove('copied'); if (txt) txt.textContent = orig; }, 1500);
        });
      };
    });
    app.querySelector('[data-restart]').onclick = resetOrder;
    return app;
  }

  function resetOrder() {
    photos.forEach(function (p) { URL.revokeObjectURL(p.url); });
    photos = []; lastOrder = null; data = blankData(); step = 'welcome'; sending = false;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    render();
  }

  // ════════════════════════════════════════ backend ════════
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText)
      return navigator.clipboard.writeText(text).catch(function () { return legacyCopy(text); });
    return Promise.resolve(legacyCopy(text));
  }
  function legacyCopy(text) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    } catch (e) {}
  }

  function compressImage(file) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function () {
        var w = img.naturalWidth, h = img.naturalHeight;
        if (w > h && w > MAX_DIM) { h = Math.round(h * MAX_DIM / w); w = MAX_DIM; }
        else if (h >= w && h > MAX_DIM) { w = Math.round(w * MAX_DIM / h); h = MAX_DIM; }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(function (blob) { blob ? resolve(blob) : reject(); }, 'image/jpeg', JPEG_QUALITY);
      };
      img.onerror = function () { URL.revokeObjectURL(url); reject(); };
      img.src = url;
    });
  }

  // Save the order + upload photos to Supabase via the create_order RPC.
  function saveOrderToSupabase() {
    if (!sb) return Promise.reject(new Error('Supabase client unavailable'));
    var tier = selectedTier();
    var shipping = isShipping();
    return sb.rpc('create_order', {
      p_customer_name: data.name.trim(),
      p_email: data.email.trim() || null,
      p_phone: data.phone.trim() || null,
      p_nail_shape: data.shape || null,
      p_design_tier: data.tier,
      p_tier_price: tier.price,
      p_sizes: data.sizes,
      p_notes: notesForSave(),
      p_fulfillment: data.fulfillment,
      p_ship_speed: data.shipSpeed || 'standard',
      p_ship_to_name: shipping ? data.name.trim() : null,
      p_address_line1: shipping ? (data.address1.trim() || null) : null,
      p_address_line2: shipping ? (data.address2.trim() || null) : null,
      p_city: shipping ? (data.city.trim() || null) : null,
      p_region: shipping ? (data.state.trim() || null) : null,
      p_postal_code: shipping ? (data.zip.trim() || null) : null,
      p_country: shipping ? 'US' : null,
      p_gift_code: data.giftCode || null
    }).then(function (res) {
      if (res.error) throw res.error;
      var rec = Array.isArray(res.data) ? res.data[0] : res.data;
      if (!rec || !rec.id) throw new Error('Order insert returned no id');
      var credit = rec.gift_applied ? (Number(rec.gift_credit) || 0) : 0;
      data.giftCredit = credit;
      if (!credit) data.giftCode = '';
      var order = { id: rec.id, order_no: rec.order_no, gift_credit: credit };
      if (!photos.length) return order;
      // Photos are BEST-EFFORT: the order + its PM-### code are already saved,
      // and the same photos are attached to the FormSubmit email, so a storage
      // hiccup must never reject the order (which would hide the payment code).
      var uploads = photos.map(function (p, i) {
        var path = order.id + '/' + (i + 1) + '.jpg';
        return sb.storage.from('inspiration')
          .upload(path, p.blob, { contentType: 'image/jpeg', upsert: false })
          .then(function (up) { if (up.error) throw up.error; return { order_id: order.id, storage_path: path, position: i }; });
      });
      return Promise.all(uploads)
        .then(function (rows) { return sb.from('order_photos').insert(rows).then(function (pr) { if (pr.error) throw pr.error; }); })
        .then(function () { return order; }, function (e) {
          if (window.console) console.error('Inspiration photo upload failed — order still saved:', e);
          return order;   // resolve with the order anyway so the code shows
        });
    });
  }

  // Load tiers/shapes/payment methods so prices/options are DB-driven.
  function loadReferenceData() {
    if (!sb) return;
    sb.from('design_tiers').select('id,name,price,description').eq('active', true).order('sort')
      .then(function (res) {
        if (!res.error && res.data && res.data.length) {
          TIERS = res.data.map(function (t) { return { id: t.id, name: t.name, price: Number(t.price), desc: t.description }; });
          syncTier();
          if (step === 'main') { paintPill(); paintFooter(); }
        }
      });
    sb.from('nail_shapes').select('id,image').eq('active', true).order('sort')
      .then(function (res) {
        if (!res.error && res.data && res.data.length) {
          SHAPES = res.data.map(function (s) { return { id: s.id, img: s.image }; });
          if (step === 'main' && data.active === 1) renderMain({ advance: false });
        }
      });
    sb.from('payment_methods').select('id,label,handle').eq('enabled', true).order('sort')
      .then(function (res) {
        if (!res.error && res.data) {
          PAY_METHODS = res.data.filter(function (m) { return PAY_BRAND[m.id] && m.handle && m.handle.trim(); });
          if (step === 'submitted') render();
        }
      });
  }

  function submitOrder() {
    sending = true;
    paintFooter();
    var tier = selectedTier();
    var sizesStr = FINGERS.map(function (f) { return f + ' ' + (data.sizes[f] || '—'); }).join('  ·  ');

    function emailOrder(orderNo) {
      var ref = orderNo != null ? orderLabel(orderNo) : null;
      var fd = new FormData();
      fd.append('_subject', 'New order' + (ref ? ' ' + ref : '') + ' — ' + data.name.trim());
      fd.append('_template', 'table');
      fd.append('_captcha', 'false');
      if (ref) fd.append('Order #', ref);
      fd.append('Name', data.name.trim());
      if (data.email.trim()) fd.append('Email', data.email.trim());
      if (data.phone.trim()) fd.append('Phone', data.phone.trim());
      fd.append('Delivery', isShipping() ? 'Ship to me' : 'Booth pickup');
      fd.append('Turnaround', isRush() ? 'Rush (about a week, +$10)' : 'Standard (2–3 weeks)');
      if (isShipping()) {
        var addrBlock = [data.address1.trim(), data.address2.trim(),
          [data.city.trim(), data.state.trim(), data.zip.trim()].filter(Boolean).join(', '), 'USA'].filter(Boolean).join('\n');
        fd.append('Shipping address', addrBlock);
      }
      fd.append('Nail shape', data.shape || 'Not selected');
      fd.append('Sizes (both hands)', sizesStr);
      fd.append('Design tier', tier.name + ' (' + money(Number(tier.price) || 0) + ')');
      fd.append('Total due', money(amountDue()) +
        ((shipFee() || rushFee() || giftCredit())
          ? ' (' + money(basePrice()) + ' set' +
            (shipFee() ? ' + ' + money(SHIP_FEE) + ' ship' : '') +
            (rushFee() ? ' + ' + money(RUSH_FEE) + ' rush' : '') +
            (giftCredit() ? ' − ' + money(giftCredit()) + ' gift' : '') + ')' : ''));
      if (giftCredit()) fd.append('Gift card', 'PREPAID · ' + money(giftCredit()) + ' credit' + (data.giftCode ? ' (code ' + data.giftCode + ')' : ''));
      fd.append('Notes', data.notes.trim() || '—');
      photos.forEach(function (p, i) { fd.append('Photo ' + (i + 1), p.blob, 'design-' + (i + 1) + '.jpg'); });
      return fetch(FORMSUBMIT_ENDPOINT, { method: 'POST', body: fd, mode: 'no-cors' })
        .then(function () { return true; }).catch(function () { return false; });
    }

    // Save to Supabase first (durable record + order number), then email with
    // that number. If the DB save fails, still email so the order isn't lost.
    saveOrderToSupabase().then(function (order) {
      lastOrder = order;
      if (order && order.id) {
        try { sb.functions.invoke('send-order-confirmation', { body: { order_id: order.id } }).catch(function () {}); }
        catch (e) {}
      }
      return emailOrder(order.order_no).then(function (emailed) { return { db: true, emailed: emailed }; });
    }, function (e) {
      if (window.console) console.error('Supabase save failed:', e);
      lastOrder = null;
      return emailOrder(null).then(function (emailed) { return { db: false, emailed: emailed }; });
    }).then(function (r) {
      sending = false;
      if (!r.db && !r.emailed) {
        paintFooter();
        if (curFootHint) curFootHint.innerHTML = '<span style="color:var(--rose);font-weight:600">That didn’t send — check your connection and try again.</span>';
        return;
      }
      step = 'submitted'; render();
    });
  }

  // boot
  syncTier();
  render();
  loadReferenceData();
  </script>
</body>
